apiVersion: v1
kind: Service
metadata:
  name: {{ include "rust-app.fullname" . }}
  labels:
    {{- include "rust-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "rust-app.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
