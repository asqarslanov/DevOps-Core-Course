replicaCount: 3

image:
  repository: asqarslanov/devops-python-app
  tag: "latest"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30080

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

livenessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 3
  timeoutSeconds: 2
  failureThreshold: 3

env:
  - name: HOST
    value: "0.0.0.0"
  - name: PORT
    value: "5000"
  - name: VISITS_FILE
    value: "/data/visits"

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

containerPort: 5000

secrets:
  enabled: true
  data:
    username: "asqarslanov"
    password: "k8s-s3cur3-p@ssw0rd"
    api-key: "ak_live_7f3e9a2b1c4d5e6f8a9b0c1d2e3f4a5b"

config:
  appName: "devops-info-service"
  environment: "dev"
  logLevel: "INFO"

persistence:
  enabled: true
  size: 100Mi
  accessMode: ReadWriteOnce
  storageClass: ""

vault:
  enabled: false
  address: "http://vault:8200"
  role: "python-app"
  secretsPath: "secret/data/python-app"
  agent:
    enabled: true
    inject: true
    secretsPath: "/vault/secrets"
    template: |
      {{- with secret "secret/data/python-app" -}}
      APP_USERNAME={{ .Data.data.username }}
      APP_PASSWORD={{ .Data.data.password }}
      API_KEY={{ .Data.data.api_key }}
      {{- end }}
